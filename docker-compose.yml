services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

  frontend:
    build: ./frontend
    # Remove the ports mapping — nginx handles it
    expose:
      - "80"
    restart: unless-stopped

  backend:
    build: ./backend
    # Remove the ports mapping — nginx handles it
    expose:
      - "8000"
    env_file: .env
    restart: unless-stopped
networks:
  default:
    driver: bridge